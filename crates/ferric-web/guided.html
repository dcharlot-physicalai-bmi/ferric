<!doctype html>
<meta charset="utf-8">
<title>Ferric — guided decoding in the browser</title>
<body style="font:14px system-ui;max-width:60ch;margin:2rem auto">
<h3>Ferric guided decoding on WebGPU</h3>
<div id="status">loading…</div>
<pre id="gen" style="background:#111;color:#0f0;padding:1rem;white-space:pre-wrap"></pre>
<script type="module">
import init, { bonsai_generate_json } from './pkg/ferric_web.js';
const log = (...a) => console.log('FERRIC>', ...a);
const $ = id => document.getElementById(id);
try {
  await init();
  log('webgpu', !!navigator.gpu);
  $('status').textContent = 'fetching model…';
  const model = new Uint8Array(await (await fetch('./model.gguf')).arrayBuffer());
  log('model bytes', model.length);
  // Exercises the 2026-07 guided-decoding features cross-fabric: required/optional properties,
  // integer minimum/maximum, string maxLength, and an array of bounded integers with maxItems.
  const props = ['id', 'name', 'score', 'tags'];
  const schema = JSON.stringify({ type: 'object', properties: {
    id:    { type: 'integer', minimum: 1, maximum: 100 },
    name:  { type: 'string', maxLength: 12 },
    score: { type: 'integer', minimum: 0, maximum: 10 },
    tags:  { type: 'array', items: { type: 'integer', minimum: 0, maximum: 9 }, maxItems: 3 },
  }, required: ['id'] });
  const onTok = (kind, payload) => {
    if (kind === 'status') $('status').textContent = payload;
    if (kind === 'token') $('gen').textContent += payload;
  };
  const out = await bonsai_generate_json(model, 'Give a fictional game character record as JSON.', 96, schema, onTok);
  $('status').textContent = 'done';
  // Validate conformance to every constraint in the browser (cross-fabric proof).
  let ok = false, why = '';
  try {
    const o = JSON.parse(out);
    const keys = Object.keys(o);
    const inOrder = keys.every((k, i) => props.includes(k) && (i === 0 || props.indexOf(keys[i - 1]) < props.indexOf(k)));
    const idOk = Number.isInteger(o.id) && o.id >= 1 && o.id <= 100;                        // required + bounds
    const nameOk = !('name' in o) || (typeof o.name === 'string' && [...o.name].length <= 12); // maxLength (code points)
    const scoreOk = !('score' in o) || (Number.isInteger(o.score) && o.score >= 0 && o.score <= 10);
    const tagsOk = !('tags' in o) || (Array.isArray(o.tags) && o.tags.length <= 3 &&
                    o.tags.every(t => Number.isInteger(t) && t >= 0 && t <= 9));             // array of bounded ints
    ok = keys.includes('id') && inOrder && idOk && nameOk && scoreOk && tagsOk;
    why = JSON.stringify({ inOrder, idOk, nameOk, scoreOk, tagsOk });
  } catch (e) { ok = false; why = 'parse:' + e; }
  log(ok ? 'RESULT_OK' : 'RESULT_BAD', JSON.stringify(out), why);
} catch (e) {
  log('ERROR', String(e && e.message || e));
  $('status').textContent = 'error: ' + e;
}
</script>
</body>
