<!doctype html><meta charset="utf-8"><title>Ferric × Vercel AI SDK</title>
<body style="font:14px system-ui;max-width:60ch;margin:2rem auto">
<h3>Ferric as a Vercel AI SDK provider — on-device, model loaded once</h3>
<div id="status">loading…</div>
<pre id="out" style="background:#111;color:#0f0;padding:1rem;white-space:pre-wrap"></pre>
<script type="module">
import { generateObject } from 'https://esm.sh/ai@5';
import { z } from 'https://esm.sh/zod@3';
import { loadFerric, ferric } from './ferric-provider.js';
const log = (...a) => console.log('FERRIC>', ...a);
const $ = id => document.getElementById(id);
try {
  $('status').textContent = 'fetching model…';
  const bytes = new Uint8Array(await (await fetch('./model.gguf')).arrayBuffer());
  log('model bytes', bytes.length);
  $('status').textContent = 'loading model once…';
  const fm = await loadFerric(bytes);          // load ONCE
  log('loaded', fm.info());
  const model = ferric(fm, { steps: 80 });     // reuse for every call
  const schema = z.object({ name: z.string(), age: z.number().int(), city: z.string() });
  const results = [];
  for (const p of ['Give a fictional person.', 'A different fictional person from Tokyo.']) {
    const t0 = performance.now();
    const { object } = await generateObject({ model, schema, prompt: p });
    const ms = Math.round(performance.now() - t0);
    results.push({ object, ms });
    log('call', JSON.stringify(object), `${ms}ms`);
  }
  $('out').textContent = results.map(r => `${JSON.stringify(r.object)}  (${r.ms}ms)`).join('\n');
  const allOk = results.every(r => typeof r.object.name === 'string' && Number.isInteger(r.object.age) && typeof r.object.city === 'string');
  // second call must NOT pay a full model-load again (weights already on GPU)
  log(allOk ? 'RESULT_OK' : 'RESULT_BAD', `2 calls, both conformant; reused one loaded model`);
} catch (e) { log('ERROR', String(e && e.message || e)); $('status').textContent = 'error: ' + e; }
</script></body>
